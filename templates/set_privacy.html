<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Privacy - PixMatch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='create_event.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='set_privacy.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo">
                    <a href="{{ url_for('dashboard') }}" style="text-decoration: none; cursor: pointer;">
                        <img src="{{ url_for('static', filename='images/pixmatch-logo.png') }}" alt="PixMatch Logo">
                    </a>
                </div>
                <nav class="sidebar-nav">
                    <ul>
                        <li><a href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M3 12H21M3 6H21M3 18H15" stroke="#667085" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                </svg> Collapse</a></li>
                        <li class="active"><a href="{{ url_for('dashboard') }}"><svg width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M19 4H5C3.89543 4 3 4.89543 3 6V20C3 21.1046 3.89543 22 5 22H19C20.1046 22 21 21.1046 21 20V6C21 4.89543 20.1046 4 19 4Z"
                                        stroke="white" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                    <path d="M16 2V6M8 2V6M3 10H21" stroke="white" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                </svg> My Events</a></li>
                        <li><a href="{{ url_for('dashboard') }}"><svg width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z"
                                        stroke="#667085" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                    <path d="M9 22V12H15V22" stroke="#667085" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg> Event Home</a></li>
                        <li><a href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M20.84 4.60987C20.3292 4.099 19.7228 3.69364 19.0554 3.41708C18.3879 3.14052 17.6725 2.99805 16.95 2.99805C16.2275 2.99805 15.5121 3.14052 14.8446 3.41708C14.1772 3.69364 13.5708 4.099 13.06 4.60987L12 5.66987L10.94 4.60987C9.9083 3.57816 8.50903 2.99858 7.05 2.99858C5.59096 2.99858 4.19169 3.57816 3.16 4.60987C2.1283 5.64156 1.54872 7.04084 1.54872 8.49987C1.54872 9.95891 2.1283 11.3582 3.16 12.3899L4.22 13.4499L12 21.2299L19.78 13.4499L20.84 12.3899C21.3508 11.8791 21.7562 11.2727 22.0327 10.6052C22.3093 9.93777 22.4518 9.22236 22.4518 8.49987C22.4518 7.77738 22.3093 7.06198 22.0327 6.39452C21.7562 5.72706 21.3508 5.12065 20.84 4.60987Z"
                                        stroke="#667085" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg> My favourites</a></li>
                    </ul>
                </nav>
            </div>
        </aside>

        <main class="main-content">
            <div class="form-container">
                <form action="{{ url_for('set_privacy') }}" method="POST">
                    <h2>Set privacy for your event</h2>
                    <p class="subtitle">You can set limited or full access for all your event albums, photos & videos
                        for enhanced privacy.</p>

                    <div class="privacy-options">
                        <label class="privacy-option">
                            <input type="radio" name="privacy" value="limited" checked>
                            <div class="option-content">
                                <div class="radio-custom"></div>
                                <h4>Limited access</h4>
                                <p>Guest user will be able to view own photos by selfie search but cannot view other
                                    photos of the event.</p>
                            </div>
                        </label>

                        <label class="privacy-option">
                            <input type="radio" name="privacy" value="full">
                            <div class="option-content">
                                <div class="radio-custom"></div>
                                <h4>Full access</h4>
                                <p>Guest user will be able to view own photos by selfie search as well as view other
                                    photos of the event.</p>
                            </div>
                        </label>
                    </div>

                    <div class="form-actions">
                        <a href="{{ url_for('create_event') }}" class="btn btn-secondary">Back</a>
                        <button type="button" class="btn btn-secondary">Cancel</button>
                        <button type="submit" class="btn btn-primary">Next</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
