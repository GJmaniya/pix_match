<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PixMatch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="info-panel">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/pixmatch-logo.png') }}" alt="PixMatch Logo"
                    style="width:180px; max-width:100%; height:auto; display:block; margin:0 auto;">
            </div>
            <img class="illustration" src="{{ url_for('static', filename='images/singin.png') }}"
                alt="Sign Up Illustration">
            <h1>Smart Photo Sharing for Your Events</h1>
            <p>Guests can find all their photos instantly with a quick selfie. Create your event for free and let
                everyone enjoy their memories without the endless search.</p>
        </div>

        <div class="form-panel">
            <h1>Sign up</h1>

            <a href="{{ url_for('login_google') }}" class="google-btn" aria-label="Sign up with Google">
                <img src="{{ url_for('static', filename='images/google.png') }}" alt="Google Icon" class="google-icon">
                <span class="google-text">Sign up with Google</span>
            </a>

            <div class="divider">
                <span>OR</span>
            </div>
            <p class="email-login-p">Sign up with Email</p>

            <form action="{{ url_for('signup') }}" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" name="first_name" placeholder="Enter your first name">
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" name="last_name" placeholder="Enter your last name">
                    </div>
                    <div class="form-group">
                        <label for="user-name">User Name</label>
                        <input type="text" id="user-name" name="username" placeholder="Enter your user name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email ID</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email id">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="Confirm your password">
                    </div>
                </div>
                <button type="submit" class="submit-btn">Sign up</button>
            </form>
